<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flujo Admisional BR — PeopleOps</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #2c2c2a; min-height: 100vh; }

/* LOGIN */
#login-screen { position: fixed; inset: 0; background: #f5f4f0; display: flex; align-items: center; justify-content: center; z-index: 9999; }
.login-card { background: #fff; border: 0.5px solid #d3d1c7; border-radius: 14px; padding: 36px 32px; width: 320px; text-align: center; }
.login-card h2 { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.login-card p { font-size: 12px; color: #888780; margin-bottom: 24px; }
.login-card input { width: 100%; padding: 9px 12px; border-radius: 8px; border: 0.5px solid #d3d1c7; background: #f5f4f0; font-size: 14px; font-family: inherit; margin-bottom: 12px; }
.login-card input:focus { outline: none; border-color: #5f5e5a; background: #fff; }
.login-card button { width: 100%; padding: 9px; border-radius: 8px; border: none; background: #2c2c2a; color: #fff; font-size: 14px; font-family: inherit; cursor: pointer; }
.login-card button:hover { background: #444441; }
.login-error { font-size: 12px; color: #a32d2d; margin-top: 8px; display: none; }

/* LAYOUT */
#app { display: none; }
header { background: #fff; border-bottom: 0.5px solid #d3d1c7; padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 15px; font-weight: 500; }
header span { font-size: 12px; color: #888780; }

/* TABS */
.tabs { display: flex; border-bottom: 0.5px solid #d3d1c7; background: #fff; padding: 0 32px; }
.tab-btn { font-size: 13px; padding: 10px 18px; background: none; border: none; border-bottom: 2px solid transparent; color: #888780; cursor: pointer; font-family: inherit; transition: color .15s, border-color .15s; }
.tab-btn.active { color: #2c2c2a; border-bottom-color: #2c2c2a; font-weight: 500; }
.tab-btn:hover:not(.active) { color: #5f5e5a; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* CONTAINER */
.container { max-width: 960px; margin: 0 auto; padding: 28px 20px 60px; }

/* SUMMARY */
.summary-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 24px; }
.sum-card { background: #fff; border: 0.5px solid #d3d1c7; border-radius: 10px; padding: 12px 14px; }
.sum-label { font-size: 11px; color: #888780; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
.sum-val { font-size: 20px; font-weight: 500; }
.sum-celonis { border-color: #1D9E75; }
.sum-celonis .sum-val { color: #0F6E56; }

/* PHASE */
.phase-block { margin-bottom: 24px; }
.phase-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; margin-bottom: 10px; }
.phase-num { font-size: 11px; font-weight: 600; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.phase-title { font-size: 13px; font-weight: 500; }
.phase-badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: rgba(255,255,255,.5); color: #5f5e5a; margin-left: auto; white-space: nowrap; }
.connector-list { text-align: center; color: #b4b2a9; font-size: 20px; margin: 4px 0; }

/* ACTIVITY CARD */
.activity-card { background: #fff; border: 0.5px solid #d3d1c7; border-radius: 10px; padding: 0; margin-bottom: 10px; overflow: hidden; transition: border-color .15s; }
.activity-card:hover { border-color: #888780; }
.activity-card.celonis-connected { border-color: #1D9E75; }
.activity-card.caso-uso { box-shadow: inset 3px 0 0 #7F77DD; }

.act-header { display: flex; align-items: flex-start; gap: 8px; padding: 12px 14px; cursor: pointer; }
.act-left { flex: 1; min-width: 0; }
.act-name { font-weight: 500; font-size: 13px; }
.act-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; align-items: center; }
.act-source-tag { font-size: 11px; color: #5f5e5a; background: #f1efe8; padding: 2px 8px; border-radius: 99px; border: 0.5px solid #d3d1c7; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; border: 0.5px solid; }
.badge-celonis { background: #e1f5ee; color: #0F6E56; border-color: #5dcaa5; }
.badge-celonis-off { background: #f1efe8; color: #888780; border-color: #d3d1c7; }
.badge-caso { background: #eeedfe; color: #534ab7; border-color: #afa9ec; }
.badge-caso-off { background: #f1efe8; color: #888780; border-color: #d3d1c7; }
.badge-qty { background: #f1efe8; color: #5f5e5a; border-color: #d3d1c7; }

.act-toggle { font-size: 13px; color: #b4b2a9; margin-top: 2px; transition: transform .2s; user-select: none; flex-shrink: 0; }
.act-toggle.open { transform: rotate(180deg); }
.act-detail { display: none; padding: 0 14px 14px; border-top: 0.5px solid #e8e6df; margin-top: 0; }
.act-detail.open { display: block; }

/* SECTION HEADER */
.section-head { font-size: 11px; font-weight: 500; color: #888780; text-transform: uppercase; letter-spacing: .04em; margin: 14px 0 8px; padding-bottom: 6px; border-bottom: 0.5px solid #e8e6df; display: flex; align-items: center; justify-content: space-between; }

/* FORM FIELDS */
.field-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.field-label { font-size: 11px; color: #888780; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.field-input { width: 100%; font-size: 13px; padding: 7px 10px; border-radius: 7px; border: 0.5px solid #d3d1c7; background: #f5f4f0; color: #2c2c2a; resize: vertical; font-family: inherit; }
.field-input:focus { outline: none; border-color: #5f5e5a; background: #fff; }
.field-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

/* TOGGLE SWITCH */
.toggle-wrap { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #f5f4f0; border-radius: 8px; margin-bottom: 10px; }
.toggle-label { font-size: 13px; color: #2c2c2a; flex: 1; }
.toggle-desc { font-size: 11px; color: #888780; }
.toggle-track { position: relative; width: 36px; height: 20px; background: #d3d1c7; border-radius: 10px; transition: background .2s; cursor: pointer; flex-shrink: 0; }
.toggle-track.on { background: #1D9E75; }
.toggle-track.on-purple { background: #7F77DD; }
.toggle-thumb { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform .2s; }
.toggle-track.on .toggle-thumb, .toggle-track.on-purple .toggle-thumb { transform: translateX(16px); }

/* DATA FIELDS TABLE */
.data-fields-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
.df-row { background: #f5f4f0; border-radius: 8px; padding: 10px 12px; border: 0.5px solid #e8e6df; }
.df-row-head { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
.df-name { font-size: 13px; font-weight: 500; color: #2c2c2a; }
.df-type { font-size: 10px; padding: 2px 6px; border-radius: 99px; }
.df-pk { font-size: 10px; padding: 2px 6px; border-radius: 99px; background: #faeeda; color: #854f0b; border: 0.5px solid #fac775; }
.df-desc { font-size: 11px; color: #888780; margin-bottom: 3px; }
.df-example { font-size: 11px; color: #5f5e5a; font-family: monospace; background: #fff; padding: 2px 6px; border-radius: 4px; border: 0.5px solid #d3d1c7; display: inline-block; }
.df-del { margin-left: auto; font-size: 11px; color: #b4b2a9; cursor: pointer; padding: 2px 5px; border-radius: 4px; border: none; background: none; }
.df-del:hover { color: #a32d2d; background: #fce8e8; }

/* ADD DATA FIELD FORM */
.add-df-form { background: #f5f4f0; border-radius: 8px; padding: 12px; margin-bottom: 8px; border: 0.5px dashed #d3d1c7; display: none; }
.add-df-form.open { display: block; }

/* SOURCE SECTION */
.source-section { background: #f5f4f0; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
.source-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.source-name-label { font-size: 12px; color: #888780; white-space: nowrap; }

/* SYSTEM BADGES */
.systems-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
.sys-badge { font-size: 11px; padding: 3px 9px; border-radius: 99px; border: 0.5px solid; }
.sys-digibee    { background: #e6f1fb; color: #185fa5; border-color: #85b7eb; }
.sys-unico      { background: #faeeda; color: #854f0b; border-color: #fac775; }
.sys-sap        { background: #eaf3de; color: #3b6d11; border-color: #97c459; }
.sys-jira       { background: #eeedfe; color: #534ab7; border-color: #afa9ec; }
.sys-ssff       { background: #f0e8f8; color: #5a2a8a; border-color: #b07ad0; }
.sys-santander  { background: #fce8e8; color: #a32d2d; border-color: #f09595; }
.sys-esocial    { background: #e1f5ee; color: #0f6e56; border-color: #5dcaa5; }
.sys-meliclick  { background: #f1efe8; color: #5f5e5a; border-color: #b4b2a9; }

/* TYPE COLORS */
.type-string   { background: #f1efe8; color: #5f5e5a; border: 0.5px solid #d3d1c7; }
.type-integer  { background: #e6f1fb; color: #185fa5; border: 0.5px solid #85b7eb; }
.type-float    { background: #e6f1fb; color: #185fa5; border: 0.5px solid #85b7eb; }
.type-date     { background: #eeedfe; color: #534ab7; border: 0.5px solid #afa9ec; }
.type-datetime { background: #eeedfe; color: #534ab7; border: 0.5px solid #afa9ec; }
.type-boolean  { background: #faeeda; color: #854f0b; border: 0.5px solid #fac775; }
.type-id       { background: #fce8e8; color: #a32d2d; border: 0.5px solid #f09595; }

/* BUTTONS */
.btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.btn { font-size: 12px; padding: 6px 14px; border-radius: 7px; border: 0.5px solid #d3d1c7; background: transparent; color: #5f5e5a; cursor: pointer; font-family: inherit; }
.btn:hover { background: #f1efe8; }
.btn-danger { color: #a32d2d; border-color: #f09595; }
.btn-danger:hover { background: #fce8e8; }
.btn-primary { background: #2c2c2a; color: #fff; border-color: #2c2c2a; }
.btn-primary:hover { background: #444441; }
.btn-sm { font-size: 11px; padding: 4px 10px; }
.btn-green { background: #e1f5ee; color: #0F6E56; border-color: #5dcaa5; }
.btn-green:hover { background: #9FE1CB; }
.add-btn { font-size: 12px; color: #888780; background: none; border: 0.5px dashed #d3d1c7; border-radius: 8px; padding: 7px 14px; cursor: pointer; width: 100%; margin-top: 4px; font-family: inherit; }
.add-btn:hover { background: #f1efe8; color: #2c2c2a; }

/* DIAGRAM */
.diagram-wrap { padding: 28px 20px 60px; overflow-x: auto; }
.diagram-scroll { min-width: 960px; }
.d-phases { display: flex; gap: 0; align-items: flex-start; }
.d-phase { flex: 1; min-width: 200px; }
.d-phase-head { padding: 10px 10px 8px; border-radius: 8px 8px 0 0; text-align: center; }
.d-num { font-size: 10px; font-weight: 600; width: 18px; height: 18px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 4px; }
.d-name { font-size: 11px; font-weight: 500; line-height: 1.3; }
.d-vol { font-size: 10px; margin-top: 3px; opacity: .7; }
.d-acts { padding: 8px; display: flex; flex-direction: column; gap: 8px; border-radius: 0 0 8px 8px; }

/* DIAGRAM CARD — default */
.d-act { background: #fff; border: 0.5px solid #d3d1c7; border-left-width: 2px; border-radius: 7px; padding: 8px 10px 8px 8px; position: relative; }
.d-act-name { font-size: 11px; font-weight: 500; line-height: 1.3; padding-right: 24px; }
.d-act-src { font-size: 10px; color: #888780; margin-top: 2px; }
.d-act-qty { font-size: 10px; font-weight: 600; position: absolute; top: 6px; right: 6px; padding: 1px 5px; border-radius: 99px; }
.d-sys-row { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 5px; }
.d-sys { font-size: 10px; padding: 1px 5px; border-radius: 99px; border: 0.5px solid; }
.d-caso-tag { font-size: 10px; margin-top: 4px; padding: 2px 6px; border-radius: 4px; background: #eeedfe; color: #534ab7; display: inline-block; }

/* DIAGRAM CARD — celonis connected (expanded) */
.d-act.celonis-on { background: #f0fbf7; border-color: #1D9E75; border-left-width: 3px; }
.d-act.celonis-on .d-act-name { color: #0F6E56; }
.celonis-header { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }
.celonis-dot { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; flex-shrink: 0; }
.celonis-label { font-size: 10px; font-weight: 600; color: #0F6E56; text-transform: uppercase; letter-spacing: .04em; }
.d-data-fields { margin-top: 6px; border-top: 0.5px solid #9FE1CB; padding-top: 6px; }
.d-df-item { font-size: 10px; color: #2c2c2a; padding: 3px 0; border-bottom: 0.5px solid #e1f5ee; }
.d-df-item:last-child { border-bottom: none; }
.d-df-label { color: #0F6E56; font-weight: 500; }
.d-df-type-badge { font-size: 9px; padding: 1px 4px; border-radius: 3px; margin-left: 4px; }
.d-df-pk-badge { font-size: 9px; padding: 1px 4px; border-radius: 3px; background: #faeeda; color: #854f0b; margin-left: 3px; }
.d-df-example { font-family: monospace; color: #888780; margin-left: 4px; }

.d-arrow { display: flex; align-items: flex-start; padding-top: 48px; flex-shrink: 0; }
.d-arrow-inner { width: 28px; text-align: center; color: #b4b2a9; font-size: 16px; }
.d-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; padding: 14px 16px; background: #fff; border: 0.5px solid #d3d1c7; border-radius: 10px; }
.d-legend-title { font-size: 11px; color: #888780; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; width: 100%; margin-bottom: 2px; }
.d-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #5f5e5a; }
.d-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* TOAST */
.toast { position: fixed; bottom: 24px; right: 24px; background: #2c2c2a; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 9998; }
.toast.show { opacity: 1; }

@media (max-width: 700px) {
  .summary-bar { grid-template-columns: repeat(2, 1fr); }
  .container { padding: 16px 12px 60px; }
  header { padding: 12px 16px; }
  .tabs { padding: 0 12px; }
  .field-grid-2, .field-grid-3 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h2>Flujo Admisional BR</h2>
    <p>PeopleOps · Acceso restringido</p>
    <input type="password" id="pwd-input" placeholder="Contraseña" onkeydown="if(event.key==='Enter')checkPwd()">
    <button onclick="checkPwd()">Ingresar</button>
    <div class="login-error" id="pwd-error">Contraseña incorrecta</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <h1>Flujo Admisional BR — PeopleOps</h1>
    <span id="last-saved">Sin cambios guardados</span>
  </header>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('list',this)">Lista de actividades</button>
    <button class="tab-btn" onclick="switchTab('diagram',this)">Diagrama de flujo</button>
  </div>
  <div class="tab-pane active" id="tab-list">
    <div class="container">
      <div class="summary-bar" id="summary-bar"></div>
      <div id="phases-container"></div>
    </div>
  </div>
  <div class="tab-pane" id="tab-diagram">
    <div class="diagram-wrap">
      <div class="diagram-scroll">
        <div class="d-phases" id="d-phases"></div>
        <div class="d-legend" id="d-legend"></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const PASSWORD = "peopleops2025";
function checkPwd() {
  if (document.getElementById('pwd-input').value === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderAll();
  } else {
    document.getElementById('pwd-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}

const sysLabels = { digibee:'Digibee', unico:'Único', sap:'SAP', jira:'Jira', ssff:'SuccessFactors', santander:'Santander', esocial:'eSocial', meliclick:'Meliclick' };
const dataTypeOptions = ['string','integer','float','date','datetime','boolean','id'];

let phases = [
  { id:'p1', name:'Colecta de info y creación de perfil', color:'#7F77DD', activities:[
    { id:'a1', name:'Completar formulario Meliclick', source:'Forms Meliclick', sourceConnectedCelonis:false, systems:['meliclick'], quantity:17, notes:'x17 formularios. Datos del candidato para creación de perfil.', casoDeUso:false, dataFields:[
      { id:'df_mel1', name:'uid', type:'id', isPK:true, description:'ID único del registro en Único (UUID)', example:'071380f7-1ee0-4b99-a2f3-296a4d9abfed' },
      { id:'df_mel2', name:'name', type:'string', isPK:false, description:'Nombre del registro en Único', example:'3PL - Service Center (3PSC_MEL)' },
      { id:'df_mel3', name:'parent_name', type:'string', isPK:false, description:'Nombre del nodo padre (organización/departamento superior)', example:'Mercado Pago' },
      { id:'df_mel4', name:'customFields.tradingName', type:'string', isPK:false, description:'Nome Fantasia / Nombre comercial', example:'3PL - Service Center (3PSC_MEL)' },
      { id:'df_mel5', name:'customFields.cnpj', type:'string', isPK:false, description:'CNPJ de la entidad (documento fiscal Brasil)', example:'03.007.331/0001-41' },

      { id:'df_mel8', name:'extraction_date', type:'date', isPK:false, description:'Fecha de extracción del dato desde Único', example:'2026-04-15' },
      { id:'df_mel9', name:'_CELONIS_CHANGE_DATE', type:'datetime', isPK:false, description:'Timestamp de cambio detectado por Celonis', example:'2026-04-15T16:32:54.896586Z' }

    { id:'a2', name:'Creación masiva de perfiles en Único', source:'ABM', sourceConnectedCelonis:true, systems:['unico'], quantity:17, notes:'ABM convierte 17 forms a Excel central. Sources: unico_branches, unico_departments, unico_organizations, unico_positions.', casoDeUso:false, dataFields:[

      { id:'df_unico3', name:'parent_name', type:'string', isPK:false, description:'Nombre del nodo padre en la jerarquía Único', example:'Mercado Pago' },
      { id:'df_unico4', name:'description', type:'string', isPK:false, description:'Descripción del nodo', example:'Mercado Livre' },

      { id:'df_unico6', name:'customFields.cnpj', type:'string', isPK:false, description:'CNPJ asociado al nodo', example:'03.007.331/0001-41' },

      { id:'df_unico10', name:'acc', type:'id', isPK:false, description:'ID de cuenta Único al que pertenece el nodo', example:'b966ec86-ab70-4673-98f6-c3defe4cabf4' },
      { id:'df_unico11', name:'code', type:'string', isPK:false, description:'Código del nodo en Único (puede ser null)', example:'40000700 IT IS Shipping Infrastructure' },

      { id:'df_unico13', name:'_CELONIS_CHANGE_DATE', type:'datetime', isPK:false, description:'Timestamp de cambio detectado por Celonis', example:'2026-04-15T16:32:53.612838Z' }

// ── UTILS ──
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function uid() { return 'x'+Date.now()+Math.floor(Math.random()*1000); }
function totalActs() { return phases.reduce((s,p)=>s+p.activities.length,0); }
function totalQty() { return phases.reduce((s,p)=>s+p.activities.reduce((a,ac)=>a+(ac.quantity||0),0),0); }
function totalCelonis() { return phases.reduce((s,p)=>s+p.activities.filter(a=>a.sourceConnectedCelonis).length,0); }
function totalCasoUso() { return phases.reduce((s,p)=>s+p.activities.filter(a=>a.casoDeUso).length,0); }
function allSysCount() { const s=new Set(); phases.forEach(p=>p.activities.forEach(a=>a.systems.forEach(x=>s.add(x)))); return s.size; }
function typeClass(t) { return 'type-'+(t||'string'); }

function switchTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if (name==='diagram') renderDiagram();
}

// ── SUMMARY ──
function renderSummary() {
  document.getElementById('summary-bar').innerHTML = `
    <div class="sum-card"><div class="sum-label">Fases</div><div class="sum-val">${phases.length}</div></div>
    <div class="sum-card"><div class="sum-label">Actividades</div><div class="sum-val">${totalActs()}</div></div>
    <div class="sum-card"><div class="sum-label">Volumen total</div><div class="sum-val">${totalQty()}</div></div>
    <div class="sum-card sum-celonis"><div class="sum-label">En Celonis</div><div class="sum-val">${totalCelonis()}</div></div>
    <div class="sum-card"><div class="sum-label">Caso de uso</div><div class="sum-val">${totalCasoUso()}</div></div>`;
}

// ── LIST RENDER ──
function renderPhases() {
  const c = document.getElementById('phases-container');
  c.innerHTML = '';
  phases.forEach((phase, pi) => {
    const vol = phase.activities.reduce((s,a)=>s+(a.quantity||0),0);
    const block = document.createElement('div');
    block.className = 'phase-block';
    block.innerHTML = `
      <div class="phase-header" style="background:${phase.color}18;border-left:3px solid ${phase.color}">
        <div class="phase-num" style="background:${phase.color}22;color:${phase.color}">${pi+1}</div>
        <span class="phase-title" style="color:${phase.color}">${phase.name}</span>
        <span class="phase-badge">${phase.activities.length} actividades · vol. ${vol}</span>
      </div>
      <div id="acts-${phase.id}"></div>
      <button class="add-btn" onclick="addActivity('${phase.id}')">+ Nueva actividad</button>`;
    c.appendChild(block);
    renderActivities(phase);
    if (pi < phases.length-1) { const conn=document.createElement('div'); conn.className='connector-list'; conn.textContent='↓'; c.appendChild(conn); }
  });
}

function renderActivities(phase) {
  const c = document.getElementById('acts-'+phase.id);
  c.innerHTML = '';
  phase.activities.forEach(act => {
    const card = document.createElement('div');
    card.className = 'activity-card' + (act.sourceConnectedCelonis?' celonis-connected':'') + (act.casoDeUso?' caso-uso':'');
    card.id = 'card-'+act.id;

    const sysBadges = act.systems.map(s=>`<span class="sys-badge sys-${s}">${sysLabels[s]||s}</span>`).join('');
    const dfCount = act.dataFields.length;

    card.innerHTML = `
      <div class="act-header" onclick="toggleCard('${act.id}')">
        <div class="act-left">
          <div class="act-name">${act.name}</div>
          <div class="act-meta">
            <span class="act-source-tag">${act.source}</span>
            <span class="badge badge-qty">×${act.quantity}</span>
            <span class="badge ${act.sourceConnectedCelonis?'badge-celonis':'badge-celonis-off'}">${act.sourceConnectedCelonis?'✓ Celonis':'Celonis'}</span>
            <span class="badge ${act.casoDeUso?'badge-caso':'badge-caso-off'}">${act.casoDeUso?'✓ Caso de uso':'Caso de uso'}</span>
            ${dfCount?`<span class="badge" style="background:#f5f4f0;color:#888780;border-color:#d3d1c7">${dfCount} campo${dfCount>1?'s':''}</span>`:''}
            ${sysBadges}
          </div>
        </div>
        <div class="act-toggle" id="toggle-${act.id}">▾</div>
      </div>
      <div class="act-detail" id="detail-${act.id}">
        ${buildActivityDetail(phase, act)}
      </div>`;
    c.appendChild(card);
  });
}

        <span class="df-name">${df.name}</span>
        <span class="df-type ${typeClass(df.type)}">${df.type}</span>
        ${df.isPK?'<span class="df-pk">PK</span>':''}
        <button class="df-del" onclick="deleteDataField('${phase.id}','${act.id}','${df.id}')">✕</button>
      </div>
      ${df.description?`<div class="df-desc">${df.description}</div>`:''}
      ${df.example?`<span class="df-example">${df.example}</span>`:''}

    <!-- BÁSICOS -->
    <div class="section-head" style="margin-top:12px">Información general</div>
    <div class="field-grid-2">
      <div class="field-row"><div class="field-label">Nombre de actividad</div>
        <input class="field-input" type="text" value="${act.name}" oninput="setField('${phase.id}','${act.id}','name',this.value)"></div>
      <div class="field-row"><div class="field-label">Cantidad / Volumen</div>
        <input class="field-input" type="number" min="0" value="${act.quantity}" oninput="setField('${phase.id}','${act.id}','quantity',parseInt(this.value)||0)"></div>
    </div>
    <div class="field-row"><div class="field-label">Notas / Descripción</div>
      <textarea class="field-input" rows="2" oninput="setField('${phase.id}','${act.id}','notes',this.value)">${act.notes}</textarea></div>
    <div class="field-row"><div class="field-label">Sistemas</div>
      <div class="systems-row">${sysBadges}</div>
      <input class="field-input" type="text" value="${act.systems.join(', ')}" placeholder="digibee, unico, sap..." style="margin-top:6px" oninput="setSystems('${phase.id}','${act.id}',this.value)"></div>

    <!-- SOURCE -->
    <div class="section-head">Source</div>
    <div class="source-section">
      <div class="source-name-row">
        <span class="source-name-label">Nombre del source:</span>
        <input class="field-input" type="text" value="${act.source}" oninput="setField('${phase.id}','${act.id}','source',this.value)" style="flex:1">
      </div>
      <div class="toggle-wrap">
        <div>
          <div class="toggle-label">Conectado en Celonis</div>
          <div class="toggle-desc">¿Este source tiene conexión activa en Celonis?</div>
        </div>
        <div class="toggle-track ${act.sourceConnectedCelonis?'on':''}" id="cel-track-${act.id}" onclick="toggleCelonis('${phase.id}','${act.id}')">
          <div class="toggle-thumb"></div>

      <div>
        <div class="toggle-label">Entra para el caso de uso</div>
        <div class="toggle-desc">¿Esta actividad es parte del caso de uso a modelar?</div>
      </div>
      <div class="toggle-track ${act.casoDeUso?'on-purple':''}" id="caso-track-${act.id}" onclick="toggleCasoUso('${phase.id}','${act.id}')">
        <div class="toggle-thumb"></div>

    <div class="section-head">

      <button class="btn btn-sm btn-green" onclick="toggleAddDFForm('${act.id}')">+ Agregar campo</button>

    <div id="df-list-${act.id}" class="data-fields-list">${dfRows||'<span style="font-size:12px;color:#b4b2a9">Sin campos de datos aún.</span>'}</div>

    <!-- ADD DATA FIELD FORM -->
    <div class="add-df-form" id="adf-form-${act.id}">
      <div class="field-grid-2">
        <div><div class="field-label">Nombre del campo</div>

// ── TOGGLES ──
function toggleCard(actId) {
  document.getElementById('detail-'+actId).classList.toggle('open');
  document.getElementById('toggle-'+actId).classList.toggle('open');
}
function toggleCelonis(phaseId, actId) {
  const act = getAct(phaseId, actId);
  act.sourceConnectedCelonis = !act.sourceConnectedCelonis;
  const track = document.getElementById('cel-track-'+actId);
  if (track) track.classList.toggle('on', act.sourceConnectedCelonis);
  const card = document.getElementById('card-'+actId);
  if (card) card.classList.toggle('celonis-connected', act.sourceConnectedCelonis);
  renderSummary();
}
function toggleCasoUso(phaseId, actId) {
  const act = getAct(phaseId, actId);
  act.casoDeUso = !act.casoDeUso;
  const track = document.getElementById('caso-track-'+actId);
  if (track) track.classList.toggle('on-purple', act.casoDeUso);
  const card = document.getElementById('card-'+actId);
  if (card) card.classList.toggle('caso-uso', act.casoDeUso);
  renderSummary();
}
function toggleAddDFForm(actId) {
  const form = document.getElementById('adf-form-'+actId);
  form.classList.toggle('open');
  if (form.classList.contains('open')) document.getElementById('adf-name-'+actId).focus();
}

// ── DATA FIELDS ──
function confirmAddDF(phaseId, actId) {
  const name = document.getElementById('adf-name-'+actId).value.trim();
  if (!name) { document.getElementById('adf-name-'+actId).focus(); return; }
  const type = document.getElementById('adf-type-'+actId).value;
  const desc = document.getElementById('adf-desc-'+actId).value.trim();
  const example = document.getElementById('adf-ex-'+actId).value.trim();
  const pkTrack = document.getElementById('adf-pk-track-'+actId);
  const isPK = pkTrack && pkTrack.dataset.pk === '1';
  const act = getAct(phaseId, actId);
  act.dataFields.push({ id:uid(), name, type, isPK, description:desc, example });
  renderPhases(); renderSummary();
  showToast('Campo "'+name+'" agregado');
}
function deleteDataField(phaseId, actId, fieldId) {
  const act = getAct(phaseId, actId);
  act.dataFields = act.dataFields.filter(f=>f.id!==fieldId);
  renderPhases(); renderSummary();
  showToast('Campo eliminado');
}

// ── FIELD UPDATES ──
function getAct(phaseId, actId) { return phases.find(p=>p.id===phaseId).activities.find(a=>a.id===actId); }
function setField(phaseId, actId, field, val) { getAct(phaseId, actId)[field] = val; }
function setSystems(phaseId, actId, val) { getAct(phaseId, actId).systems = val.split(',').map(s=>s.trim()).filter(Boolean); }
function saveAct(phaseId, actId) {
  document.getElementById('last-saved').textContent = 'Guardado: '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  renderPhases(); renderSummary(); renderDiagram();
  showToast('Cambios guardados');
}
function deleteAct(phaseId, actId) {
  if (!confirm('¿Eliminar esta actividad?')) return;
  phases.find(p=>p.id===phaseId).activities = phases.find(p=>p.id===phaseId).activities.filter(a=>a.id!==actId);
  renderPhases(); renderSummary(); renderDiagram();
  showToast('Actividad eliminada');
}
function addActivity(phaseId) {
  const phase = phases.find(p=>p.id===phaseId);
  const newId = uid();
  phase.activities.push({ id:newId, name:'Nueva actividad', source:'', sourceConnectedCelonis:false, systems:[], quantity:1, notes:'', casoDeUso:false, dataFields:[] });
  renderPhases(); renderSummary();
  setTimeout(()=>{ toggleCard(newId); document.getElementById('card-'+newId).scrollIntoView({behavior:'smooth',block:'center'}); },60);
}

// ── DIAGRAM ──
function renderDiagram() {
  const container = document.getElementById('d-phases');
  container.innerHTML = '';
  const allSys = new Set();
  phases.forEach((phase, pi) => {
    const vol = phase.activities.reduce((s,a)=>s+(a.quantity||0),0);
    const col = document.createElement('div');
    col.className = 'd-phase';
    col.innerHTML = `
      <div class="d-phase-head" style="background:${phase.color}18;border-top:3px solid ${phase.color}">
        <div class="d-num" style="background:${phase.color}22;color:${phase.color}">${pi+1}</div>
        <div class="d-name" style="color:${phase.color}">${phase.name}</div>
        <div class="d-vol" style="color:${phase.color}">vol. ${vol}</div>
      </div>`;
    const acts = document.createElement('div');
    acts.className = 'd-acts';
    acts.style.cssText = `background:${phase.color}07;border:0.5px solid ${phase.color}30;border-top:none;border-radius:0 0 8px 8px;`;

    phase.activities.forEach(act => {
      act.systems.forEach(s=>allSys.add(s));
      const card = document.createElement('div');
      const isCelonis = act.sourceConnectedCelonis;
      card.className = 'd-act' + (isCelonis?' celonis-on':'');
      card.style.borderLeftColor = isCelonis ? '#1D9E75' : phase.color;

      const sysBadges = act.systems.map(s=>`<span class="d-sys sys-${s}">${sysLabels[s]||s}</span>`).join('');

      let dataFieldsHTML = '';
      if (isCelonis && act.dataFields.length) {
        const rows = act.dataFields.map(df=>`
          <div class="d-df-item">
            <span class="d-df-label">${df.name}</span>
            <span class="d-df-type-badge ${typeClass(df.type)}">${df.type}</span>
            ${df.isPK?'<span class="d-df-pk-badge">PK</span>':''}
            ${df.example?`<span class="d-df-example">→ ${df.example}</span>`:''}
          </div>`).join('');
        dataFieldsHTML = `<div class="d-data-fields">${rows}</div>`;
      }

      card.innerHTML = `
        ${isCelonis?`<div class="celonis-header"><div class="celonis-dot"></div><span class="celonis-label">Celonis conectado</span></div>`:''}
        <div class="d-act-qty" style="background:${phase.color}18;color:${phase.color}">${act.quantity}</div>
        <div class="d-act-name">${act.name}</div>
        <div class="d-act-src">${act.source}</div>
        ${act.systems.length?`<div class="d-sys-row">${sysBadges}</div>`:''}
        ${act.casoDeUso?`<div class="d-caso-tag">✓ Caso de uso</div>`:''}
        ${dataFieldsHTML}`;
      acts.appendChild(card);
    });

    col.appendChild(acts);
    container.appendChild(col);
    if (pi < phases.length-1) {
      const arrow = document.createElement('div');
      arrow.className = 'd-arrow';
      arrow.innerHTML = `<div class="d-arrow-inner">→</div>`;
      container.appendChild(arrow);
    }
  });

  // Legend
  const legend = document.getElementById('d-legend');
  legend.innerHTML = `
    <div class="d-legend-title">Leyenda</div>
    <div class="d-legend-item"><div class="d-legend-dot" style="background:#1D9E75"></div> Source conectado en Celonis (muestra campos de datos)</div>
    <div class="d-legend-item"><div class="d-legend-dot" style="background:#7F77DD"></div> Entra para el caso de uso</div>
    <div class="d-legend-item"><div class="d-legend-dot" style="background:#d3d1c7"></div> Sin conexión Celonis</div>
    <div style="width:100%;border-top:0.5px solid #e8e6df;margin:6px 0"></div>
    <div class="d-legend-title" style="margin-bottom:4px">Sistemas</div>
    ${[...allSys].map(s=>`<span class="sys-badge sys-${s}">${sysLabels[s]||s}</span>`).join('')}`;
}

function renderAll() { renderSummary(); renderPhases(); renderDiagram(); }
</script>
</body>
</html>
